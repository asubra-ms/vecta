apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-agent
  namespace: spire
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-server
  namespace: spire
spec:
  selector:
    matchLabels:
      app: spire-server
  serviceName: spire-server
  replicas: 1
  template:
    metadata:
      labels:
        app: spire-server
    spec:
      containers:
      - name: spire-server
        # Updated to use the local Vecta registry
        image: localhost:5000/spire-server:clean
        imagePullPolicy: Always
        command: ["/opt/spire/bin/spire-server"]
        args: ["run", "-config", "/run/spire/config/server.conf"]
        volumeMounts:
          - name: spire-config
            mountPath: /run/spire/config
          - name: spire-data
            mountPath: /run/spire/data
      volumes:
        - name: spire-config
          configMap:
            name: spire-server-forced
        - name: spire-data
          emptyDir: {}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spire-agent
  namespace: spire
spec:
  selector:
    matchLabels:
      app: spire-agent
  template:
    metadata:
      labels:
        app: spire-agent
    spec:
      hostPID: true
      hostNetwork: true
      serviceAccountName: spire-agent
      containers:
        - name: spire-agent
          # Updated to use the local Vecta registry and the correct agent-specific image
          image: localhost:5000/spire-server:clean
          imagePullPolicy: IfNotPresent
          # Full path to the binary in the sovereign image
          command: ["/opt/spire/bin/spire-agent"]
          args: ["run", "-config", "/run/spire/config/agent.conf"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
            - name: spire-bundle
              mountPath: /run/spire/bundle
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
      volumes:
        - name: spire-config
          configMap:
            name: spire-agent
        - name: spire-bundle
          hostPath:
            path: /run/spire/bundle
            type: DirectoryOrCreate
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate

